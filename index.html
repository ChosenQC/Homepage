<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TODO</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>TODO</h1>

    <!-- 登录区 -->
    <section id="loginView" class="card">
      <h2>进入</h2>
      <p class="muted">输入用户名和口令（你配置的那批）</p>
      <div class="row">
        <input id="usernameInput" placeholder="用户名" autocomplete="username" />
        <input id="passwordInput" placeholder="口令" type="password" autocomplete="current-password" />
      </div>
      <div class="row">
        <button id="loginBtn">登录</button>
      </div>
      <p id="loginMsg" class="msg"></p>
    </section>

    <!-- 应用区 -->
    <section id="appView" class="card hidden">
      <div class="row space-between">
        <div>
          <h2 id="helloTitle">Hi</h2>
          <p class="muted">你的列表存在本地浏览器（localStorage）里。</p>
        </div>
        <button id="logoutBtn" class="ghost">退出</button>
      </div>

      <div class="row">
        <input id="newTodoInput" placeholder="添加一个 todo，比如：写论文" />
        <button id="addBtn">添加</button>
      </div>

      <ul id="todoList" class="list"></ul>
      <p class="muted small">提示：点标题可编辑；Enter 保存；Esc 取消。</p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
