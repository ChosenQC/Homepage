<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TODO</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>TODO</h1>

    <!-- 登录区 -->
    <section id="loginView" class="card">
      <h2>进入</h2>
      <p class="muted">输入用户名 + 站点口令（即 Worker 的 SITE_SECRET）。</p>

      <div class="row">
        <input id="usernameInput" placeholder="用户名" autocomplete="username" />
        <input id="passwordInput" placeholder="站点口令" type="password" autocomplete="current-password" />
      </div>

      <div class="row">
        <label class="checkbox">
          <input id="rememberPw" type="checkbox" />
          <span>记住口令（同浏览器下次免输）</span>
        </label>
      </div>

      <div class="row">
        <button id="loginBtn">登录</button>
      </div>

      <p id="loginMsg" class="msg"></p>
      <p class="muted small">提示：口令不会上传到 GitHub，只用于访问你的 Worker。</p>
    </section>

    <!-- 应用区 -->
    <section id="appView" class="card hidden">
      <div class="row space-between">
        <div>
          <h2 id="helloTitle">Hi</h2>
          <p class="muted">数据存在 GitHub Issue 中，通过 Worker 同步。</p>
        </div>
        <div class="row">
          <button id="syncBtn" class="ghost">同步</button>
          <button id="logoutBtn" class="ghost">退出</button>
        </div>
      </div>

      <div class="row">
        <input id="newTodoInput" placeholder="添加一个 todo，比如：写论文" />
        <input id="newDeadlineInput" type="date" />
        <button id="addBtn">添加</button>
      </div>

      <ul id="todoList" class="list"></ul>

      <p class="muted small">
        操作：勾选完成；点标题编辑（Enter 保存 / Esc 取消）；修改日期即更新 deadline；删除按钮删除。
      </p>
      <p id="appMsg" class="muted small"></p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
