<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TODO Calendar</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>TODO</h1>

    <!-- 登录/注册 -->
    <section id="authView" class="card">
      <div class="row space-between" style="margin-top:0">
        <h2 id="authTitle" style="margin:0">登录</h2>
        <div class="row" style="margin-top:0">
          <button id="toLoginBtn" class="ghost">登录</button>
          <button id="toRegisterBtn" class="ghost">注册</button>
        </div>
      </div>

      <p class="muted small" style="margin-top:8px">
        站点口令用于访问 Worker（SITE_SECRET）；用户密码用于区分不同用户。
      </p>

      <div class="row">
        <input id="usernameInput" placeholder="用户名（1~32, 字母数字_-）" autocomplete="username" />
      </div>

      <div class="row">
        <input id="siteSecretInput" placeholder="站点口令（SITE_SECRET）" type="password" />
      </div>

      <div class="row">
        <input id="userPwInput" placeholder="用户密码（自己设）" type="password" autocomplete="current-password" />
      </div>

      <div class="row hidden" id="userPw2Row">
        <input id="userPw2Input" placeholder="确认用户密码（仅注册）" type="password" autocomplete="new-password" />
      </div>

      <div class="row">
        <label class="checkbox"><input id="rememberUser" type="checkbox" /><span>记住用户名</span></label>
        <label class="checkbox"><input id="rememberSite" type="checkbox" /><span>记住站点口令</span></label>
        <label class="checkbox"><input id="rememberPw" type="checkbox" /><span>记住用户密码</span></label>
      </div>

      <div class="row">
        <button id="authBtn">登录</button>
      </div>

      <p id="authMsg" class="msg"></p>
    </section>

    <!-- App -->
    <section id="appView" class="card hidden">
      <div class="row space-between" style="margin-top:0">
        <div>
          <h2 id="helloTitle" style="margin:0">Hi</h2>
          <p class="muted">周视图（日历任务）+ 侧边栏优先级（拖拽）。</p>
        </div>
        <div class="row" style="margin-top:0">
          <button id="prevWeekBtn" class="ghost">← 上一周</button>
          <button id="todayBtn" class="ghost">今天</button>
          <button id="nextWeekBtn" class="ghost">下一周 →</button>
          <button id="syncBtn" class="ghost">同步</button>
          <button id="logoutBtn" class="ghost">退出</button>
        </div>
      </div>

      <div class="layout">
        <!-- Calendar -->
        <section class="calendar card2">
          <div class="calTop">
            <div class="weekTitle" id="weekTitle"></div>
            <div class="muted small">点击某个时间格添加任务；拖动侧边栏可改优先级。</div>
          </div>

          <div class="calGrid" id="calGrid">
            <!-- JS render -->
          </div>
        </section>

        <!-- Sidebar -->
        <aside class="sidebar card2">
          <div class="sideTop">
            <div class="sideTitle">优先级</div>
            <div class="muted small">默认按时间顺序；可拖拽排序。</div>
          </div>

          <div class="sideActions row" style="margin-top:10px">
            <button id="newDeadlineBtn">+ 新建 Deadline</button>
          </div>

          <ul id="priorityList" class="plist"></ul>
          <p id="appMsg" class="muted small"></p>
        </aside>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div id="modalOverlay" class="modalOverlay hidden">
    <div class="modal card">
      <div class="row space-between" style="margin-top:0">
        <h3 id="modalTitle" style="margin:0">新建任务</h3>
        <button id="modalCloseBtn" class="ghost">关闭</button>
      </div>

      <div class="row">
        <input id="taskTitleInput" placeholder="任务标题" />
      </div>

      <div class="row">
        <label class="checkbox"><input id="taskIsDeadline" type="checkbox" /><span>这是 Deadline 任务（不占日历格）</span></label>
      </div>

      <div id="scheduledFields">
        <div class="row">
          <div class="muted small" style="min-width:120px">开始时间</div>
          <input id="taskStartInput" type="datetime-local" />
        </div>

        <div class="row">
          <div class="muted small" style="min-width:120px">时长（分钟）</div>
          <input id="taskDurInput" type="number" min="15" step="15" value="60" />
        </div>
      </div>

      <div id="deadlineFields" class="hidden">
        <div class="row">
          <div class="muted small" style="min-width:120px">Deadline</div>
          <input id="taskDeadlineInput" type="datetime-local" />
        </div>
      </div>

      <div class="row">
        <button id="modalSaveBtn">保存</button>
        <button id="modalDeleteBtn" class="del hidden">删除</button>
      </div>

      <p id="modalMsg" class="msg"></p>
    </div>
  </div>

  <script src="./app.js?v=20260305-2"></script>
</body>
</html>
